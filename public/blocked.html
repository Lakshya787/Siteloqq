<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Siteloqq | Focus Required</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #E0E5EC;
      --text-main: #3D4852;
      --text-muted: #6B7280;
      --accent: #6C63FF;
      --alert: #ef4444;
      
      --shadow-extruded: 9px 9px 16px rgba(163,177,198,0.6), -9px -9px 16px rgba(255,255,255,0.5);
      --shadow-extruded-hover: 12px 12px 20px rgba(163,177,198,0.7), -12px -12px 20px rgba(255,255,255,0.6);
      --shadow-inset: inset 6px 6px 10px rgba(163,177,198,0.6), inset -6px -6px 10px rgba(255,255,255,0.5);
      --shadow-inset-deep: inset 10px 10px 20px rgba(163,177,198,0.7), inset -10px -10px 20px rgba(255,255,255,0.6);
      --shadow-inset-small: inset 3px 3px 6px rgba(163,177,198,0.6), inset -3px -3px 6px rgba(255,255,255,0.5);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    h1, h2, h3, h4 { font-family: 'Plus Jakarta Sans', sans-serif; }

    /* Decorative Floating BG Elements */
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      background-color: var(--bg-color);
      box-shadow: var(--shadow-extruded);
      animation: float 6s ease-in-out infinite;
      z-index: 0;
    }
    
    .bg-circle-inner {
        position: absolute;
        top: 20%; left: 20%; right: 20%; bottom: 20%;
        border-radius: 50%;
        box-shadow: var(--shadow-inset);
    }

    .circle-1 { width: 300px; height: 300px; top: -50px; left: -50px; animation-delay: 0s; }
    .circle-2 { width: 200px; height: 200px; bottom: 10%; right: 5%; animation-delay: 2s; }
    .circle-3 { width: 100px; height: 100px; top: 20%; right: 15%; animation-delay: 4s; }

    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    .card {
      position: relative;
      z-index: 10;
      background-color: var(--bg-color);
      box-shadow: var(--shadow-extruded);
      max-width: 540px;
      width: 100%;
      margin: 0 1.5rem;
      border-radius: 32px;
      padding: 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .icon-well {
      width: 100px; height: 100px;
      margin-bottom: 2rem;
      border-radius: 50%;
      background-color: var(--bg-color);
      box-shadow: var(--shadow-inset-deep);
      display: flex; align-items: center; justify-content: center;
    }

    .icon-well img { width: 40px; height: 40px; opacity: 0.8; }

    h1 {
      font-size: 2.5rem; font-weight: 800;
      margin-bottom: 0.5rem; text-align: center; letter-spacing: -0.03em;
      color: var(--text-main);
    }

    .divider { 
        height: 4px; width: 60px; 
        box-shadow: var(--shadow-inset-small);
        background-color: var(--bg-color); 
        border-radius: 9999px; margin: 1.5rem 0; 
    }

    h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-muted); text-align: center; }

    .desc { color: var(--text-muted); text-align: center; margin-bottom: 2.5rem; line-height: 1.6; font-size: 1.05rem; }
    .desc strong { color: var(--text-main); font-weight: 700; }

    .info-well {
      width: 100%; background-color: var(--bg-color);
      border-radius: 24px; padding: 1.5rem; margin-bottom: 2rem;
      box-shadow: var(--shadow-inset);
      text-align: center;
    }

    .info-well h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); font-weight: 800; margin-bottom: 0.5rem; }
    .info-well p { font-size: 0.95rem; color: var(--text-main); line-height: 1.5; font-weight: 500; }
    .info-well span { color: var(--accent); font-weight: 700; }

    .btn {
      width: 100%; background-color: var(--bg-color); color: var(--text-main);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800; font-size: 1.15rem; letter-spacing: -0.01em;
      padding: 1.2rem 2rem; border-radius: 16px;
      border: none; cursor: pointer; transition: all 0.3s ease-out;
      box-shadow: var(--shadow-extruded);
    }
    .btn:hover { box-shadow: var(--shadow-extruded-hover); transform: translateY(-1px); color: var(--accent); }
    .btn:active { box-shadow: var(--shadow-inset-small); transform: translateY(1px); }

  </style>
</head>
<body>
  
  <div class="bg-circle circle-1"><div class="bg-circle-inner"></div></div>
  <div class="bg-circle circle-2"><div class="bg-circle-inner"></div></div>
  <div class="bg-circle circle-3"><div class="bg-circle-inner"></div></div>

  <div class="card">
    
    <div class="icon-well">
        <img src="icon.svg" alt="Siteloqq Logo" />
    </div>

    <h1>Access Denied</h1>
    <h2>You are supposed to be focusing.</h2>
    
    <div class="divider"></div>
    
    <p class="desc">
      This URL is restricted by your <strong>Siteloqq</strong> configuration. Do not let distractions hijack your productivity. Complete your goals first.
    </p>

    <div class="info-well">
      <h3>Emergency Unlock</h3>
      <p>
        Open the Siteloqq extension and complete the <span>500-word typing challenge</span> to force an override.
      </p>
    </div>

    <button id="close-btn" class="btn">
      Close Tab & Get To Work
    </button>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
